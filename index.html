<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SNAKE DRAFT MULTIPLAYER - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');
        body { background: #050508; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .fvpl-font { font-family: Oswald, sans-serif; }
        .gold-text { color: #facc15; }
        .active-turn { border: 2px solid #facc15; background: rgba(250, 204, 21, 0.1); box-shadow: 0 0 20px rgba(250, 204, 21, 0.3); }
        .slot { height: 32px; background: rgba(255,255,255,0.03); margin-bottom: 2px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; border-radius: 4px; border-left: 3px solid transparent; }
        .slot-filled { border-left-color: #facc15; background: rgba(250, 204, 21, 0.05); }
    </style>
</head>
<body>

    <!-- MÀN HÌNH LOGIN -->
    <div id="screen-login" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <div class="bg-gray-900 p-10 rounded-3xl border-t-4 border-yellow-500 w-full max-w-md text-center shadow-2xl">
            <h1 class="fvpl-font text-5xl italic font-black gold-text mb-2 uppercase">MULTIPLAYER DRAFT</h1>
            <div class="text-left mb-6 mt-8">
                <select id="role-select" class="w-full p-4 bg-black border border-gray-700 rounded-xl text-white font-bold outline-none focus:border-yellow-500 transition-all">
                    <option value="admin">🛠️ QUẢN TRỊ VIÊN (ADMIN)</option>
                    <option value="viewer">📺 MÀN HÌNH KHÁN GIẢ (LIVE)</option>
                    <option value="player-0">👤 TEAM 01</option>
                    <option value="player-1">👤 TEAM 02</option>
                    <option value="player-2">👤 TEAM 03</option>
                    <option value="player-3">👤 TEAM 04</option>
                </select>
            </div>
            <button onclick="doLogin()" class="w-full py-4 bg-yellow-600 text-black font-black fvpl-font italic text-2xl rounded-xl hover:bg-yellow-500 transition-all">KẾT NỐI PHÒNG</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden h-screen w-screen flex flex-col p-4">
        <div class="flex justify-between items-center bg-gray-900/40 p-5 rounded-2xl border border-white/5 mb-4 shadow-xl backdrop-blur-md">
            <div>
                <div id="display-role" class="text-[10px] font-bold text-yellow-500 uppercase tracking-[0.3em] mb-1 italic">VAI TRÒ: ---</div>
                <div id="round-info" class="text-2xl font-black fvpl-font italic uppercase text-white leading-none">ROUND 1 | TEAM 1 ĐANG CHỌN</div>
            </div>
            <div id="timer-display" class="text-8xl font-black fvpl-font italic gold-text leading-none drop-shadow-2xl">00:30</div>
            <div id="admin-controls" class="hidden flex gap-2">
                <button onclick="toggleTimer()" id="pause-btn" class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-bold uppercase italic">Bắt đầu</button>
                <button onclick="resetDraft()" class="bg-red-900 px-4 py-2 rounded-lg text-[10px] font-bold uppercase italic">Reset</button>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6 flex-1 overflow-hidden">
            <div id="team-container" class="col-span-12 lg:col-span-5 grid grid-cols-2 gap-3 overflow-y-auto pr-2"></div>
            <div id="pick-zone" class="col-span-12 lg:col-span-7 flex flex-col bg-gray-900/30 rounded-3xl p-6 border border-white/5 overflow-hidden">
                <div id="admin-setup" class="hidden mb-6 p-4 bg-yellow-600/5 border border-yellow-600/20 rounded-2xl flex items-center gap-4">
                    <input type="file" id="csv-file" accept=".csv" class="text-xs">
                    <button onclick="handleImport()" class="bg-white text-black px-4 py-2 rounded font-bold text-[10px] uppercase">Nạp CSV Lên Server</button>
                </div>
                <input type="text" id="search-input" oninput="searchPlayer()" placeholder="Tìm cầu thủ..." class="w-full p-6 bg-black border-2 border-gray-800 rounded-2xl text-3xl outline-none focus:border-yellow-500 italic mb-6">
                <div id="player-list" class="flex-1 overflow-y-auto grid grid-cols-2 gap-3 content-start"></div>
            </div>
        </div>
    </div>

    <!-- ANNOUNCEMENT -->
    <div id="anno" class="hidden fixed inset-0 z-[10000] bg-black/95 flex items-center justify-center backdrop-blur-sm">
        <div class="text-center">
            <div class="text-3xl italic font-bold text-yellow-500 uppercase mb-4 tracking-widest" id="anno-team">---</div>
            <div class="text-[120px] font-black fvpl-font italic text-white uppercase leading-none border-y-4 border-yellow-500 py-4" id="anno-player">---</div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH FIREBASE ---
        const firebaseConfig = {
            databaseURL: "https://test-7b6d4-default-rtdb.firebaseio.com"
            apiKey: "AIzaSyCfbFKpqUxCUUCnYS7ZrHS-pfwbmQ4_dFk",
            authDomain: "test-7b6d4.firebaseapp.com",
            projectId: "test-7b6d4",
            storageBucket: "test-7b6d4.firebasestorage.app",
            messagingSenderId: "1051481560305",
            appId: "1:1051481560305:web:3f69ad14e54dff01a68550",
            measurementId: "G-WWCDMDG469"
        };
        // -----------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const stateRef = db.ref('draft_state');
        const dbRef = db.ref('player_db');

        let database = [];
        let state = {
            currentPick: 0,
            teams: Array.from({ length: 4 }, (_, i) => ({ id: i, name: `TEAM 0${i+1}`, roster: [] })),
            pickedIds: [],
            timer: 30,
            isPaused: true,
            lastPickInfo: null
        };
        let userRole = '';

        function doLogin() {
            userRole = document.getElementById('role-select').value;
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');

            if (userRole === 'admin') {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('admin-setup').classList.remove('hidden');
                setInterval(adminTimerLoop, 1000);
            } else if (userRole === 'viewer') {
                document.getElementById('pick-zone').classList.add('hidden');
                document.getElementById('team-container').className = "col-span-12 grid grid-cols-4 gap-4 overflow-y-auto";
            }

            // Lắng nghe dữ liệu thời gian thực từ Firebase
            stateRef.on('value', (snapshot) => {
                const val = snapshot.val();
                if (val) {
                    // Nếu có người vừa pick, hiện thông báo
                    if (state.currentPick < val.currentPick && val.lastPickInfo) {
                        showAnnouncement(val.lastPickInfo.team, val.lastPickInfo.player);
                    }
                    state = val;
                    renderUI();
                }
            });

            dbRef.on('value', (snapshot) => {
                if (snapshot.val()) database = snapshot.val();
            });
        }

        // Import CSV và đẩy lên server cho tất cả mọi người thấy
        function handleImport() {
            const fileInput = document.getElementById('csv-file');
            if (!fileInput.files[0]) return alert("Chọn file!");
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n').slice(1);
                const newData = rows.map(row => {
                    const cols = row.split(',');
                    return { id: cols[0]?.trim(), name: cols[1]?.trim(), dob: cols[2]?.trim() };
                }).filter(p => p.id && p.name);
                dbRef.set(newData);
                alert("Đã đẩy dữ liệu lên Server!");
            };
            reader.readAsText(fileInput.files[0]);
        }

        function getCurrentTeamIdx() {
            let round = Math.floor(state.currentPick / 4);
            let turn = state.currentPick % 4;
            return (round % 2 !== 0) ? (3 - turn) : turn;
        }

        function searchPlayer() {
            const val = document.getElementById('search-input').value.toLowerCase().trim();
            const listDiv = document.getElementById('player-list');
            listDiv.innerHTML = '';
            if (val.length < 2) return;
            const results = database.filter(p => p.name.toLowerCase().includes(val)).slice(0, 10);
            results.forEach(p => {
                const isPicked = (state.pickedIds || []).includes(p.id);
                const card = document.createElement('div');
                card.className = `bg-gray-800 p-5 rounded-2xl flex justify-between items-center ${isPicked ? 'opacity-10 grayscale' : 'hover:border-yellow-500 cursor-pointer border border-transparent hover:bg-gray-700 transition-all'}`;
                card.innerHTML = `
                    <div>
                        <div class="font-black fvpl-font italic text-xl uppercase text-white leading-none mb-1">${p.name}</div>
                        <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">ID: ${p.id}</div>
                    </div>
                    ${!isPicked ? `<button onclick="doPick('${p.id}')" class="bg-yellow-600 text-black px-4 py-2 rounded font-black text-xs italic">PICK</button>` : ''}
                `;
                listDiv.appendChild(card);
            });
        }

        function doPick(id) {
            const currentIdx = getCurrentTeamIdx();
            if (userRole !== 'admin' && userRole !== `player-${currentIdx}`) return alert("KHÔNG PHẢI LƯỢT!");
            const p = database.find(item => item.id === id);
            
            state.teams[currentIdx].roster = state.teams[currentIdx].roster || [];
            state.teams[currentIdx].roster.push(p);
            state.pickedIds = state.pickedIds || [];
            state.pickedIds.push(id);
            state.currentPick++;
            state.timer = 30;
            state.lastPickInfo = { team: state.teams[currentIdx].name, player: p.name };

            stateRef.set(state); // Cập nhật Firebase
            document.getElementById('search-input').value = '';
            document.getElementById('player-list').innerHTML = '';
        }

        function renderUI() {
            const currentIdx = getCurrentTeamIdx();
            document.getElementById('display-role').innerText = "VAI TRÒ: " + userRole.toUpperCase();
            document.getElementById('round-info').innerText = `ROUND ${Math.floor(state.currentPick / 4) + 1} | ${state.teams[currentIdx].name} ĐANG CHỌN`;
            
            const container = document.getElementById('team-container');
            container.innerHTML = state.teams.map((team, tIdx) => {
                const isActive = (tIdx === currentIdx);
                let slotsHtml = '';
                const roster = team.roster || [];
                for(let i=0; i<11; i++) {
                    const p = roster[i];
                    slotsHtml += `<div class="slot ${p ? 'slot-filled' : ''}">
                        <span class="text-gray-600 mr-2 w-4 font-bold">${i+1}</span>
                        <span class="truncate uppercase font-bold text-white tracking-tight">${p ? p.name : ''}</span>
                        ${(p && userRole === 'admin') ? `<button onclick="removePick(${tIdx},${i})" class="ml-auto text-red-500 hover:text-white font-bold px-2">✕</button>` : ''}
                    </div>`;
                }
                return `<div class="flex flex-col bg-gray-900/80 rounded-2xl overflow-hidden border border-white/5 transition-all ${isActive ? 'active-turn' : 'opacity-60'}">
                    <div class="p-3 text-center font-black italic fvpl-font text-sm ${isActive ? 'bg-yellow-500 text-black' : 'bg-gray-800 text-gray-500'} uppercase">${team.name}</div>
                    <div class="p-3">${slotsHtml}</div>
                </div>`;
            }).join('');

            const display = document.getElementById('timer-display');
            display.innerText = `00:${String(state.timer).padStart(2, '0')}`;
            if (state.timer <= 10) display.classList.add('text-red-600', 'animate-pulse');
            else display.classList.remove('text-red-600', 'animate-pulse');
        }

        function adminTimerLoop() {
            if (!state.isPaused) {
                if (state.timer > 0) state.timer--;
                else { state.timer = 30; state.currentPick++; }
                stateRef.set(state);
            }
        }

        function toggleTimer() { 
            state.isPaused = !state.isPaused; 
            document.getElementById('pause-btn').innerText = state.isPaused ? "Tiếp tục" : "Tạm dừng";
            stateRef.set(state); 
        }

        function removePick(tIdx, pIdx) {
            const p = state.teams[tIdx].roster[pIdx];
            state.pickedIds = state.pickedIds.filter(id => id !== p.id);
            state.teams[tIdx].roster.splice(pIdx, 1);
            state.currentPick--;
            stateRef.set(state);
        }

        function showAnnouncement(team, player) {
            const anno = document.getElementById('anno');
            document.getElementById('anno-team').innerText = team + " ĐÃ CHỌN";
            document.getElementById('anno-player').innerText = player;
            anno.classList.remove('hidden');
            setTimeout(() => anno.classList.add('hidden'), 3000);
        }

        function resetDraft() { if(confirm("Xóa toàn bộ giải?")) stateRef.set(null); }
    </script>
</body>
</html>
