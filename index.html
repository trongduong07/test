<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DRAFT SYSTEM - CSV IMPORT ENABLED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');
        body { background: #08080c; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .fvpl-font { font-family: Oswald, sans-serif; }
        .gold-text { color: #facc15; }
        .active-turn { border: 2px solid #facc15; background: rgba(250, 204, 21, 0.1); box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .slot { height: 30px; background: rgba(255,255,255,0.03); margin-bottom: 2px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; border-radius: 4px; border-left: 3px solid transparent; }
        .slot-filled { border-left-color: #facc15; background: rgba(250, 204, 21, 0.05); }
        #player-list::-webkit-scrollbar { width: 5px; }
        #player-list::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH CHỌN VAI TRÒ -->
    <div id="screen-login" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <div class="bg-gray-900 p-8 rounded-2xl border-t-4 border-yellow-500 w-96 text-center shadow-2xl">
            <h1 class="fvpl-font text-4xl italic font-black gold-text mb-6 uppercase tracking-widest">DRAFT PRO</h1>
            <div class="text-left mb-6">
                <label class="text-[10px] font-bold text-gray-500 uppercase mb-2 block">Chọn vai trò:</label>
                <select id="role-select" class="w-full p-4 bg-black border border-gray-700 rounded text-white font-bold outline-none focus:border-yellow-500">
                    <option value="admin">QUẢN TRỊ VIÊN (ADMIN)</option>
                    <option value="viewer">MÀN HÌNH KHÁN GIẢ (STREAM)</option>
                    <option value="player-0">TEAM 01 (NGƯỜI CHƠI)</option>
                    <option value="player-1">TEAM 02 (NGƯỜI CHƠI)</option>
                    <option value="player-2">TEAM 03 (NGƯỜI CHƠI)</option>
                    <option value="player-3">TEAM 04 (NGƯỜI CHƠI)</option>
                </select>
            </div>
            <button onclick="doLogin()" class="w-full py-4 bg-yellow-600 text-black font-black fvpl-font italic text-xl rounded hover:bg-yellow-500 transition-all">VÀO PHÒNG DRAFT</button>
        </div>
    </div>

    <!-- MAIN APP -->
    
    <div id="main-app" class="hidden h-screen w-screen flex flex-col p-4">
        
        <!-- HEADER -->
        <div class="flex justify-between items-center bg-gray-900/50 p-5 rounded-xl border border-white/5 mb-4">
            <div class="flex items-center gap-6">
                <div>
                    <div id="display-role" class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest">---</div>
                    <div id="round-info" class="text-2xl font-black fvpl-font italic uppercase text-white">ROUND 1 | TEAM 1 ĐANG CHỌN</div>
                </div>
            </div>
            <div class="text-center">
                <div id="timer-display" class="text-7xl font-black fvpl-font italic gold-text">00:30</div>
            </div>
            <div id="admin-controls" class="hidden flex gap-2">
                <button onclick="toggleTimer()" id="pause-btn" class="bg-blue-600 px-4 py-2 rounded text-[10px] font-bold uppercase italic">Bắt đầu</button>
                <button onclick="resetDraft()" class="bg-red-900 px-4 py-2 rounded text-[10px] font-bold uppercase italic">Reset</button>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6 flex-1 overflow-hidden">
            <!-- 4 TEAMS BOARD -->
            <div id="team-container" class="col-span-12 lg:col-span-5 grid grid-cols-2 gap-3 overflow-y-auto pr-2"></div>

            <!-- SEARCH & PICK ZONE -->
            <div id="pick-zone" class="col-span-12 lg:col-span-7 flex flex-col bg-gray-900/30 rounded-xl p-4 border border-white/5 overflow-hidden">
                
                <!-- ADMIN ONLY: IMPORT CSV -->
                <div id="admin-setup" class="hidden mb-4 p-4 bg-yellow-600/10 border border-yellow-600/30 rounded-lg">
                    <p class="text-[10px] font-bold gold-text uppercase mb-2 italic">Cài đặt Database (Chỉ Admin thấy):</p>
                    <input type="file" id="csv-file" accept=".csv" class="text-xs text-gray-400 file:bg-yellow-600 file:border-none file:px-4 file:py-1 file:rounded file:mr-4 file:font-bold pointer-events-auto">
                    <button onclick="handleImport()" class="ml-2 bg-white text-black px-4 py-1 rounded text-[10px] font-bold uppercase">Nạp Data</button>
                </div>

                <!-- SEARCH ENGINE -->
                <div class="mb-4">
                    <input type="text" id="search-input" oninput="searchPlayer()" placeholder="Nhập tên cầu thủ để tìm..." 
                           class="w-full p-5 bg-black border-2 border-gray-800 rounded-xl text-2xl outline-none focus:border-yellow-500 italic">
                </div>

                <div id="player-list" class="flex-1 overflow-y-auto grid grid-cols-2 gap-2 content-start pr-2">
                    <div class="col-span-2 text-center text-gray-600 mt-20 italic">Chưa có dữ liệu. Admin hãy nạp file CSV.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ANNOUNCEMENT OVERLAY -->
    <div id="anno" class="hidden fixed inset-0 z-[10000] bg-black/95 flex items-center justify-center">
        <div class="text-center">
            <div class="text-2xl italic font-bold text-yellow-500 uppercase mb-4" id="anno-team">TEAM SELECTED</div>
            <div class="text-[100px] font-black fvpl-font italic text-white uppercase leading-none" id="anno-player">RONALDO</div>
        </div>
    </div>

    <script>
         window.onload = function() {
            fetch('data.csv') // Tên file csv của bạn trên github
                .then(response => response.text())
                .then(text => {
                    const rows = text.split('\n').slice(1);
                    database = rows.map(row => {
                        const cols = row.split(',');
                        return { id: cols[0]?.trim(), name: cols[1]?.trim(), dob: cols[2]?.trim() };
                    }).filter(p => p.id && p.name);
                    localStorage.setItem('draft_db', JSON.stringify(database));
                    console.log("Database loaded!");
                });
        };
        // TRẠNG THÁI TOÀN CỤC
        let database = [];
        let state = {
            currentPick: 0,
            teams: Array.from({ length: 4 }, (_, i) => ({ id: i, name: `TEAM 0${i+1}`, roster: [] })),
            pickedIds: [],
            timer: 30,
            isPaused: true
        };
        let userRole = '';

        // 1. ĐĂNG NHẬP & KHỞI TẠO
        function doLogin() {
            userRole = document.getElementById('role-select').value;
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');

            if (userRole === 'admin') {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('admin-setup').classList.remove('hidden');
            } else if (userRole === 'viewer') {
                document.getElementById('pick-zone').classList.add('hidden');
                document.getElementById('team-container').className = "col-span-12 grid grid-cols-4 gap-4 overflow-y-auto";
            }

            loadState();
            renderUI();
            setInterval(syncLoop, 1000);
        }

        // 2. XỬ LÝ IMPORT CSV
        function handleImport() {
            const fileInput = document.getElementById('csv-file');
            if (!fileInput.files[0]) return alert("Vui lòng chọn file .csv");

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n').slice(1); // Bỏ header
                database = rows.map(row => {
                    const cols = row.split(',');
                    return { id: cols[0]?.trim(), name: cols[1]?.trim(), dob: cols[2]?.trim() };
                }).filter(p => p.id && p.name);
                
                localStorage.setItem('draft_db', JSON.stringify(database));
                alert("Đã nạp " + database.length + " cầu thủ!");
                searchPlayer(); // Refresh danh sách hiển thị
            };
            reader.readAsText(fileInput.files[0]);
        }

        // 3. LOGIC SNAKE DRAFT
        function getCurrentTeamIdx() {
            let round = Math.floor(state.currentPick / 4);
            let turn = state.currentPick % 4;
            return (round % 2 !== 0) ? (3 - turn) : turn;
        }

        // 4. TÌM KIẾM & PICK
        function searchPlayer() {
            if (database.length === 0) {
                const storedDb = localStorage.getItem('draft_db');
                if (storedDb) database = JSON.parse(storedDb);
            }

            const val = document.getElementById('search-input').value.toLowerCase().trim();
            const listDiv = document.getElementById('player-list');
            listDiv.innerHTML = '';

            if (val.length < 2) return;

            const results = database.filter(p => p.name.toLowerCase().includes(val)).slice(0, 10);
            
            results.forEach(p => {
                const isPicked = state.pickedIds.includes(p.id);
                const card = document.createElement('div');
                card.className = `bg-gray-800 p-4 rounded-xl border border-gray-700 flex justify-between items-center ${isPicked ? 'opacity-20 grayscale' : 'hover:border-yellow-500 cursor-pointer'}`;
                card.innerHTML = `
                    <div>
                        <div class="font-black fvpl-font italic text-lg uppercase leading-none mb-1">${p.name}</div>
                        <div class="text-[9px] text-gray-500 uppercase font-bold">ID: ${p.id} • ${p.dob}</div>
                    </div>
                    ${!isPicked ? `<button onclick="doPick('${p.id}')" class="bg-yellow-600 text-black px-4 py-1 rounded font-black italic text-[10px]">PICK</button>` : ''}
                `;
                listDiv.appendChild(card);
            });
        }

        function doPick(id) {
            const currentIdx = getCurrentTeamIdx();
            if (userRole !== 'admin' && userRole !== `player-${currentIdx}`) return alert("CHƯA ĐẾN LƯỢT CỦA BẠN!");

            const p = database.find(item => item.id === id);
            state.teams[currentIdx].roster.push(p);
            state.pickedIds.push(id);
            state.currentPick++;
            state.timer = 30;

            saveState();
            renderUI();
            showAnnouncement(state.teams[currentIdx].name, p.name);
            document.getElementById('search-input').value = '';
            document.getElementById('player-list').innerHTML = '';
        }

        // 5. HIỂN THỊ UI
        function renderUI() {
            const currentIdx = getCurrentTeamIdx();
            document.getElementById('display-role').innerText = userRole.toUpperCase();
            document.getElementById('round-info').innerText = `ROUND ${Math.floor(state.currentPick / 4) + 1} | ${state.teams[currentIdx].name} ĐANG CHỌN`;
            
            const container = document.getElementById('team-container');
            container.innerHTML = state.teams.map((team, tIdx) => {
                const isActive = (tIdx === currentIdx);
                let slotsHtml = '';
                for(let i=0; i<11; i++) {
                    const p = team.roster[i];
                    slotsHtml += `<div class="slot ${p ? 'slot-filled' : ''}">
                        <span class="text-gray-600 mr-2 w-3">${i+1}</span>
                        <span class="truncate uppercase font-bold text-white">${p ? p.name : ''}</span>
                        ${(p && userRole === 'admin') ? `<button onclick="removePick(${tIdx},${i})" class="ml-auto text-red-500 hover:text-white font-bold">✕</button>` : ''}
                    </div>`;
                }
                return `
                    <div class="flex flex-col bg-gray-900 rounded-xl overflow-hidden border border-white/5 ${isActive ? 'active-turn' : ''}">
                        <div class="p-2 text-center font-black italic fvpl-font text-xs ${isActive ? 'bg-yellow-500 text-black' : 'bg-gray-800 text-gray-500'} uppercase">
                            ${team.name}
                        </div>
                        <div class="p-2">${slotsHtml}</div>
                    </div>`;
            }).join('');
        }

        function removePick(tIdx, pIdx) {
            const p = state.teams[tIdx].roster[pIdx];
            state.pickedIds = state.pickedIds.filter(id => id !== p.id);
            state.teams[tIdx].roster.splice(pIdx, 1);
            state.currentPick--;
            saveState();
            renderUI();
        }

        // 6. ĐỒNG BỘ & TIMER
        function syncLoop() {
            if (userRole === 'admin' && !state.isPaused) {
                if (state.timer > 0) state.timer--;
                else { state.timer = 30; state.currentPick++; }
                saveState();
            } else {
                loadState();
            }
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const display = document.getElementById('timer-display');
            display.innerText = `00:${String(state.timer).padStart(2, '0')}`;
            if (state.timer <= 10) display.classList.add('text-red-600', 'animate-pulse');
            else display.classList.remove('text-red-600', 'animate-pulse');
        }

        function saveState() { localStorage.setItem('draft_v4_state', JSON.stringify(state)); }
        function loadState() {
            const saved = localStorage.getItem('draft_v4_state');
            if (saved) state = JSON.parse(saved);
            const storedDb = localStorage.getItem('draft_db');
            if (storedDb && database.length === 0) database = JSON.parse(storedDb);
        }

        function toggleTimer() { state.isPaused = !state.isPaused; document.getElementById('pause-btn').innerText = state.isPaused ? "Tiếp tục" : "Tạm dừng"; saveState(); renderUI(); }
        function resetDraft() { if(confirm("Xóa toàn bộ dữ liệu?")) { localStorage.removeItem('draft_v4_state'); location.reload(); } }

        function showAnnouncement(team, player) {
            const anno = document.getElementById('anno');
            document.getElementById('anno-team').innerText = team + " ĐÃ CHỌN";
            document.getElementById('anno-player').innerText = player;
            anno.classList.remove('hidden');
            setTimeout(() => anno.classList.add('hidden'), 3000);
        }

        // Lắng nghe thay đổi từ các tab khác
        window.addEventListener('storage', () => { loadState(); renderUI(); });
    </script>
</body>
</html>
